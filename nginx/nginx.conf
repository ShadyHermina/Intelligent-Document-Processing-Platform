# nginx.conf — Reverse proxy, load balancer, rate limiter
#
# Nginx config has two scopes:
# - "main" context: the top level, outside any block
# - blocks: http {}, server {}, location {} etc., each nested inside the previous

# ── Main context ──────────────────────────────────────────────────────────────

# worker_processes auto: Nginx spawns one worker process per CPU core.
# "auto" detects the core count at startup. Alternative: hardcode a number
# like worker_processes 2. "auto" is always better unless you have a specific
# reason to limit CPU usage.
worker_processes auto;

# error_log: where Nginx writes its own internal error messages.
# "warn" logs warnings and above. Use "debug" only when diagnosing
# a startup failure — it is very verbose.
error_log /var/log/nginx/error.log warn;

# pid: where Nginx writes its master process ID.
# Required for reload and stop signals to work correctly.
pid /var/run/nginx.pid;


# ── Events block ──────────────────────────────────────────────────────────────
# Required by Nginx — it will not start without this block.
events {
    # Maximum simultaneous connections per worker process.
    # 1024 is the standard default for a dev/demo environment.
    worker_connections 1024;
}


# ── HTTP block ────────────────────────────────────────────────────────────────
http {

    # ── Upload size limit ─────────────────────────────────────────────────────
    #
    # client_max_body_size sets the maximum allowed size for any request body.
    # 20m means 20 megabytes.
    #
    # This is enforced by Nginx before the request is forwarded to FastAPI.
    # An oversized request is rejected immediately with HTTP 413.
    # FastAPI never sees it, never reads it, never buffers it.
    #
    # Why here in the http block and not inside a location block?
    # Putting it here applies it globally to every route — /api/, /ws/,
    # and /. That is correct. We do not want large uploads sneaking through
    # the Streamlit route either.
    #
    # Why 20m? Document processing workloads typically involve PDFs and
    # Word files. 20MB covers virtually all real documents while stopping
    # accidental or malicious oversized uploads cleanly.
    client_max_body_size 20m;


    # ── Rate limiting zone ────────────────────────────────────────────────────
    # Defines a shared memory zone for tracking how many requests
    # each client IP is making per second.
    #
    # $binary_remote_addr: the client's IP address in binary form.
    # Binary uses 4 bytes per IPv4 address vs up to 15 bytes as a string.
    # More memory-efficient — 10MB in binary holds ~160,000 IP entries.
    #
    # zone=api_limit:10m: name this zone "api_limit", give it 10MB of memory.
    #
    # rate=10r/s: each IP is allowed 10 requests per second.
    # Requests beyond this are either queued (burst) or rejected (429).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;


    # ── Upstream pool ─────────────────────────────────────────────────────────
    # Defines the group of FastAPI backend servers Nginx load-balances across.
    # No algorithm keyword means round-robin — the default and correct choice
    # for stateless backends. Request 1 goes to fastapi_a, request 2 goes to
    # fastapi_b, request 3 goes to fastapi_a, and so on.
    upstream fastapi_pool {

        # ADDED: max_fails and fail_timeout — were missing from the original.
        #
        # max_fails=2: if Nginx gets 2 consecutive failures from a server
        # (connection refused, timeout, or 5xx error), mark it as unavailable.
        #
        # fail_timeout=10s: keep it marked unavailable for 10 seconds,
        # then try it again. If it responds, it re-enters the pool.
        #
        # Without these settings, Nginx keeps sending traffic to a dead
        # server forever. With them, failure recovery is automatic.
        server fastapi_a:8000 max_fails=2 fail_timeout=10s;
        server fastapi_b:8000 max_fails=2 fail_timeout=10s;
    }


    # ── Server block ──────────────────────────────────────────────────────────
    # A server block is one virtual server — a set of rules for requests
    # arriving on a specific port.
    server {

        # Accept HTTP connections on port 80.
        # Port 80 is mapped to the host in docker-compose.yml,
        # so http://localhost reaches this block.
        listen 80;

        # server_name _: the underscore is a catch-all.
        # Handle requests regardless of what domain name was used.
        # Correct for a local dev setup with no real domain.
        server_name _;


        # ── API routes ────────────────────────────────────────────────────────
        # Handles all REST API traffic whose path starts with /api/
        #
        # The ^~ prefix modifier means: if this prefix matches, use this
        # block immediately and do not check any regex rules after it.
        # This prevents a future regex location block from accidentally
        # capturing /api/ traffic.
        location ^~ /api/ {

            # Apply the rate limit zone defined above.
            # burst=20: allow a short spike of up to 20 extra requests
            # to queue before returning 429. Handles legitimate bursts
            # without immediately punishing the client.
            limit_req zone=api_limit burst=20 nodelay;

            # Forward matching requests to the FastAPI upstream pool.
            # The trailing slash on /api/ and http://fastapi_pool/ is
            # important: it strips the /api/ prefix before forwarding.
            # So a request for /api/health arrives at FastAPI as /health.
            # Without the trailing slash, FastAPI would receive /api/health
            # and would need to register routes with /api/ prefix — messy.
            proxy_pass http://fastapi_pool/;

            # Pass the original Host header to FastAPI.
            # Without this, FastAPI sees "fastapi_pool" as the Host.
            proxy_set_header Host $host;

            # Pass the real client IP to FastAPI.
            # Without this, every request appears to come from Nginx's
            # internal container IP — the audit_log becomes useless.
            proxy_set_header X-Real-IP $remote_addr;

            # Standard header for preserving the full IP chain through
            # multiple proxies. $proxy_add_x_forwarded_for appends
            # the current client IP to any existing chain.
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Tell FastAPI whether the original request was HTTP or HTTPS.
            # Always "http" now but set correctly for when TLS arrives.
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        # ── WebSocket routes to FastAPI ───────────────────────────────────────
        # ADDED: was completely missing from the original config.
        #
        # Handles WebSocket connections whose path starts with /ws/
        # These are connections that start as HTTP and then "upgrade"
        # to a persistent two-way WebSocket connection.
        #
        # Why a separate block from /api/?
        # The upgrade headers below must only be sent on connections
        # that are actually upgrading to WebSocket. Adding them inside
        # /api/ would attach them to all REST requests too — wrong.
        # A dedicated /ws/ block keeps the two types of traffic clean.
        location ^~ /ws/ {

            # Forward to the same FastAPI pool.
            # WebSocket connections go to the same application instances
            # as REST calls — FastAPI handles both.
            # The trailing slash strips /ws/ before forwarding, same
            # logic as the /api/ block above.
            proxy_pass http://fastapi_pool/;

            # WebSocket requires HTTP/1.1.
            # Nginx defaults to HTTP/1.0 for proxied connections.
            # HTTP/1.0 does not support the persistent connections that
            # WebSocket depends on. Without this line, the upgrade
            # handshake fails immediately.
            proxy_http_version 1.1;

            # $http_upgrade contains whatever upgrade protocol the client
            # requested — typically "websocket".
            # Passing it through tells the backend what kind of upgrade
            # the client wants.
            proxy_set_header Upgrade $http_upgrade;

            # "upgrade" tells the backend this is a connection upgrade
            # request. Required by the WebSocket handshake specification.
            proxy_set_header Connection "upgrade";

            # Same real-IP and host headers as the /api/ block.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        # ── Streamlit frontend ────────────────────────────────────────────────
        # Catch-all: any request that did not match /api/ or /ws/
        # lands here and is forwarded to the Streamlit container.
        #
        # Why / and not /streamlit/?
        # Streamlit serves its UI at / and generates asset paths relative
        # to the root (/_stcore/, /static/, etc.). If we proxied /streamlit/
        # instead, those asset requests would not match this block and
        # would return 404. The only correct approach is to catch everything
        # at / and forward it to Streamlit.
        location / {

            # Forward to Streamlit on its internal port.
            # No upstream pool here because we have one Streamlit instance.
            # A single server can be proxied directly.
            proxy_pass http://streamlit:8501;

            # WebSocket support — same as the /ws/ block.
            # Streamlit uses WebSockets internally to push live UI updates
            # from the server to the browser. Without these three lines,
            # Streamlit loads visually but immediately disconnects and
            # stops responding. This is the most common Nginx + Streamlit
            # mistake.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}