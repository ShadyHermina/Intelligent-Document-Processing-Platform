# nginx.conf — Reverse proxy, load balancer, rate limiter
#
# Nginx config has two scopes:
# - "main" context: the top level, outside any block
# - blocks: http {}, server {}, location {} etc., each nested inside the previous

# ── Main context ──────────────────────────────────────────────────

# worker_processes auto: Nginx spawns one worker process per CPU core.
# "auto" detects the core count at startup. Alternative: hardcode a number
# like worker_processes 2. "auto" is always better unless you have a specific
# reason to limit CPU usage.
worker_processes auto;

# error_log: where Nginx writes its own error messages (not access logs).
# /var/log/nginx/error.log is the conventional path inside the container.
# "warn" means only warnings and above are logged. Use "debug" temporarily
# if Nginx refuses to start and you need to diagnose why.
error_log /var/log/nginx/error.log warn;

# pid: where Nginx writes its master process ID.
# Required for signals (nginx -s reload, nginx -s stop) to work.
pid /var/run/nginx.pid;


# ── Events block ──────────────────────────────────────────────────
# The events block configures how Nginx handles connections at the
# OS level. It is required — Nginx will not start without it.
events {
    # worker_connections: maximum simultaneous connections per worker process.
    # Total max connections = worker_processes * worker_connections.
    # 1024 is the standard default. Raise it only if you measure that
    # you are hitting the limit under load.
    worker_connections 1024;
}


# ── HTTP block ────────────────────────────────────────────────────
# Everything related to HTTP traffic lives inside this block.
http {

    # ── Rate limiting ─────────────────────────────────────────────
    # limit_req_zone defines a shared memory zone for tracking request
    # rates. It must be defined here in the http block, before any
    # server block that uses it.
    #
    # key=$binary_remote_addr: track by client IP address.
    # $binary_remote_addr stores the IP in binary form (4 bytes for IPv4)
    # rather than string form — uses less memory per entry.
    # Alternative: $remote_addr (string form) — works but uses more RAM.
    #
    # zone=api_limit:10m: name this zone "api_limit", allocate 10MB of
    # shared memory for it. 10MB holds approximately 160,000 IP entries.
    # More than enough for a dev/demo environment.
    #
    # rate=10r/s: allow a maximum of 10 requests per second per IP.
    # Requests beyond this rate are held in a queue (burst) or rejected.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;


    # ── Upstream blocks ───────────────────────────────────────────
    # An upstream block defines a pool of backend servers.
    # Nginx load-balances across the servers listed inside it.
    #
    # The default load-balancing algorithm is round-robin: requests
    # are distributed to each server in turn, one at a time.
    # Alternative algorithms: least_conn (send to the server with
    # fewest active connections), ip_hash (same client always goes
    # to the same server). Round-robin is correct for stateless APIs.

    upstream fastapi_pool {
        # Docker Compose places all containers on a shared bridge network.
        # Container names are registered as DNS hostnames on that network.
        # "fastapi_a" and "fastapi_b" are the container names we will
        # define in docker-compose.yml. Nginx resolves them by name.
        # Port 8000 is the port uvicorn listens on inside each container.
        server fastapi_a:8000;
        server fastapi_b:8000;
    }


    # ── Server block ──────────────────────────────────────────────
    # A server block defines a virtual server — a set of rules for
    # handling requests that arrive on a specific port.
    server {

        # listen 80: accept HTTP connections on port 80.
        # This is the port we will map to the host in docker-compose.yml
        # so that http://localhost reaches this server block.
        listen 80;

        # server_name _: the underscore is a catch-all.
        # It means "handle requests regardless of what Host header
        # the client sent." For a local dev setup with no domain name,
        # this is the correct setting.
        server_name _;


        # ── API routes ────────────────────────────────────────────
        # location /api/ matches any request whose path starts with /api/
        location /api/ {

            # limit_req applies the rate limit zone we defined above.
            # burst=20: allow a short burst of up to 20 queued requests
            # before starting to reject. This handles legitimate traffic
            # spikes without immediately returning 429 errors.
            # nodelay: process burst requests immediately rather than
            # spacing them out over time. Without nodelay, Nginx would
            # drip-feed burst requests at the rate limit speed, adding
            # artificial latency.
            limit_req zone=api_limit burst=20 nodelay;

            # proxy_pass forwards the request to the upstream pool.
            # Nginx will round-robin between fastapi_a:8000 and
            # fastapi_b:8000 for every request that hits /api/
            proxy_pass http://fastapi_pool/;

            # proxy_set_header instructions rewrite the request headers
            # before forwarding to the backend.
            #
            # Host $host: pass the original Host header through.
            # Without this, FastAPI sees "fastapi_pool" as the Host,
            # which breaks any host-based routing logic in later phases.
            #
            # X-Real-IP $remote_addr: pass the client's real IP address.
            # Inside the container, the request appears to come from Nginx.
            # This header lets FastAPI see the original client IP for
            # logging, rate limiting, and audit trails.
            #
            # X-Forwarded-For $proxy_add_x_forwarded_for: the standard
            # header for communicating the client IP through a proxy chain.
            # $proxy_add_x_forwarded_for appends the client IP to any
            # existing X-Forwarded-For header, preserving the full chain
            # if there are multiple proxies in front of Nginx.
            #
            # X-Forwarded-Proto $scheme: tells the backend whether the
            # original request was HTTP or HTTPS. In Phase 0 this is
            # always "http", but the header should be set correctly from
            # the start so HTTPS works transparently when we add TLS.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        # ── Frontend route ────────────────────────────────────────
        # location / is the catch-all: any request that did not match
        # /api/ falls through to here and is forwarded to Streamlit.
        # This is correct: the API has a specific prefix, everything
        # else is the frontend.
        location / {

            # proxy_pass to Streamlit on port 8501.
            # Note: no upstream block for Streamlit because we only
            # have one Streamlit instance. A single server can be
            # proxied directly without defining an upstream pool.
            proxy_pass http://streamlit:8501;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Streamlit.
            # Streamlit uses WebSockets to push live updates from the
            # server to the browser (re-renders, progress bars, etc.).
            # Without these three headers, the WebSocket upgrade handshake
            # fails and the Streamlit page loads but never updates.
            #
            # Upgrade $http_upgrade: passes the client's "Upgrade: websocket"
            # header through to Streamlit.
            #
            # Connection "upgrade": tells Streamlit this is a connection
            # upgrade request, not a regular HTTP request.
            #
            # proxy_http_version 1.1: WebSockets require HTTP/1.1.
            # Nginx defaults to HTTP/1.0 for proxied requests.
            # Without this, the upgrade handshake fails silently.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}